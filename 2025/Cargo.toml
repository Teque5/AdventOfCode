regex = "1.12.3"
reqwest = { version = "0.13.4", features = ["blocking"] }
tempfile = "3.27.0"

# useful crates from prior years
#rayon = "1.10.0"
#lru = "0.16.3"

[[bin]]
name = "advent_of_code_2025"
path = "src/main.rs"
