[package]
name = "aoc"
version = "2025.0.0"
authors = ["Teque5"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
ab_glyph = "0.2.32"
image = "0.25.10"
imageproc = "0.26.2"
indicatif = "0.18.4"
itertools = "0.14.0"
lazy_static = "1.5.0"
ndarray = "0.17.2"
